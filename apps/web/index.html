<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fundout — It's just math.</title>
    <meta name="description" content="It's not your trading. It's just math. Backtest, model, and track your propfirm strategy with real probability." />
    <script>
      // Prevent theme flash: apply saved theme class before React mounts.
      try {
        const stored = localStorage.getItem('theme');
        const theme = stored || 'system';
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = theme === 'dark' || (theme === 'system' && prefersDark);
        document.documentElement.classList.toggle('dark', isDark);
        document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
